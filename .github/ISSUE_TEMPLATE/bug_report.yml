name: Bug report
description: Something is broken or behaves unexpectedly
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please search [existing issues](https://github.com/adhikareeprayush/stacksmith/issues) first.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `npx @adhikareeprayush/stacksmith create my-app --preset mern -y`
        2. ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - create / scaffold
        - add / features
        - list
        - doctor
        - setup
        - Plugin loading
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Stacksmith version and Node version
      placeholder: stacksmith 0.1.0, node 20.x

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Terminal output or screenshots
