name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels: ["feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem does this solve? Who benefits?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should it work?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI / commands
        - Scaffold / generator
        - Plugin system
        - Frontend plugin
        - Backend plugin
        - Database / ORM plugin
        - Auth plugin
        - Deployment
        - Documentation
        - CI / testing
        - Other
    validations:
      required: true

  - type: checkboxes
    id: willing
    attributes:
      label: Contribution
      options:
        - label: I am willing to open a PR for this
